<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VotoGeral 360 — CRM de Prospecção Eleitoral</title>
    <script>
      (function () {
        try {
          var t = JSON.parse(localStorage.getItem('vg-theme'));
          if (t && t.state && t.state.theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
